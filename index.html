<!DOCTYPE html>
<!-- saved from url=(0042)https://simpleskans.com.br/dnd/2024/magias -->
<html lang="pt-BR"><script async="" src="https://www.clarity.ms/tag/lqt7soyxw2"></script>
<head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
    <meta name="theme-color" content="#121214">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Diário de Treino">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>Diário de Treino</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

  :root{
    --bg: #121214;
    --surface: #1b1b1f;
    --surface-alt: #232328;
    --border: #2e2e34;
    --text: #f5f3ee;
    --text-muted: #9b9aa3;
    --accent: #ff5a36;
    --accent-dim: #ff5a3622;

    --peito: #ff5a5a;
    --costas: #4da6ff;
    --perna: #4ade80;
    --ombro: #facc15;
    --braco: #c084fc;
    --core: #2dd4bf;
    --outro: #9b9aa3;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html{ font-size:16px; background:var(--bg); }
  body{
    margin:0;
    min-height:100dvh;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
    touch-action:manipulation;
  }
  #app{
    max-width:760px;
    min-height:100dvh;
    margin:0 auto;
    padding:max(16px, env(safe-area-inset-top)) 14px calc(24px + env(safe-area-inset-bottom));
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  h1.brand{
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:2px;
    font-size:clamp(28px, 8vw, 38px);
    margin:12px 0 2px;
    line-height:1;
  }
  .brand-sub{ color:var(--text-muted); font-size:14px; margin:0 0 4px; line-height:1.4; }

  .tabs{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-bottom:2px;
    position:sticky;
    top:0;
    z-index:5;
    background:var(--bg);
    padding-top:4px;
  }
  .tab-btn{
    min-height:46px;
    padding:10px 8px;
    text-align:center;
    border-radius:14px;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text-muted);
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    letter-spacing:.3px;
    transition:.15s;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .tab-btn.active{ background:var(--accent); color:#151013; border-color:var(--accent); }

  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:18px;
    padding:14px;
    margin-bottom:10px;
    box-shadow:0 6px 20px rgba(0,0,0,.16);
  }
  label{ display:block; font-size:11px; color:var(--text-muted); margin-bottom:6px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; }
  input, select{
    width:100%;
    min-height:46px;
    background:var(--surface-alt);
    border:1px solid var(--border);
    color:var(--text);
    padding:12px 13px;
    border-radius:12px;
    font-size:16px;
    font-family:'Inter',sans-serif;
  }
  input:focus, select:focus{ outline:none; border-color:var(--accent); }
  input[type="date"]{ min-width:0; width:100%; max-width:100%; }
  input[type="number"]{ appearance:textfield; -moz-appearance:textfield; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  .row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .row > div{ min-width:0; }
  .row > div:nth-child(3){ grid-column:1 / -1; }
  .filter-row > div{ min-width:0; }
  .filter-row input, .filter-row select{ width:100%; max-width:100%; }

  .group-badge{
    display:inline-flex; align-items:center; gap:6px; padding:7px 12px;
    border-radius:999px; font-size:13px; font-weight:700; letter-spacing:.3px;
    margin-top:8px;
  }
  .dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }

  .combo-wrap{ position:relative; }
  .combo-suggestions{
    position:absolute;
    top:calc(100% + 4px);
    left:0;
    right:0;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    box-shadow:0 10px 24px rgba(0,0,0,.24);
    z-index:12;
    display:none;
    max-height:220px;
    overflow:auto;
  }
  .combo-option{
    width:100%;
    border:0;
    background:transparent;
    color:var(--text);
    text-align:left;
    padding:10px 12px;
    font-size:14px;
    cursor:pointer;
  }
  .combo-option:hover{ background:var(--surface-alt); }

  .btn{
    width:100%; min-height:48px; padding:13px 14px; border-radius:14px; border:none;
    font-weight:700; font-size:15px; cursor:pointer; letter-spacing:.3px;
    font-family:'Inter',sans-serif;
  }
  .btn-primary{ background:var(--accent); color:#151013; }
  .btn-ghost{ background:transparent; border:1px solid var(--border); color:var(--text); }
  .btn-add{ background:var(--surface-alt); border:1px dashed var(--border); color:var(--accent); }
  .btn-small{ min-height:36px; padding:8px 12px; font-size:13px; border-radius:10px; width:auto; }

  .set-row{
    display:flex; align-items:center; gap:10px; padding:12px;
    background:var(--surface-alt); border-radius:12px; margin-bottom:8px;
    min-height:46px;
  }
  .set-num{
    font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--accent);
    width:24px; text-align:center; flex-shrink:0;
  }
  .set-data{ flex:1; font-family:'JetBrains Mono',monospace; font-size:14px; display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
  .set-data .lbl{ color:var(--text-muted); font-family:'Inter',sans-serif; font-size:11px; margin-right:3px; }
  .del-btn{ background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:18px; padding:2px 6px; }
  .del-btn:hover{ color:var(--peito); }

  .empty{ color:var(--text-muted); font-size:14px; text-align:center; padding:16px 0; }

  .stat-grid{ display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:8px; margin-bottom:14px; }
  .stat{
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:12px 8px; text-align:center;
  }
  .stat .num{ font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700; color:var(--accent); }
  .stat .lbl{ font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.4px; margin-top:4px; }

  .filter-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }

  .ex-card{ border-left:3px solid var(--outro); padding-left:12px; margin-bottom:16px; }
  .ex-title{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; gap:8px; }
  .ex-name{ font-weight:700; font-size:15px; }
  .ex-vol{ font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text-muted); }
  .set-chip-row{ display:flex; flex-wrap:wrap; gap:6px; }
  .set-chip{
    font-family:'JetBrains Mono',monospace; font-size:12px; background:var(--surface-alt);
    border:1px solid var(--border); border-radius:8px; padding:6px 9px; display:flex; align-items:center; gap:6px;
  }
  .set-chip button{ background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:12px; padding:0; }

  .day-list-item{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 6px; border-bottom:1px solid var(--border); cursor:pointer;
    min-height:48px;
    gap:10px;
  }
  .day-list-item:last-child{ border-bottom:none; }
  .day-list-item:hover{ background:var(--surface-alt); }
  .day-date{ font-weight:600; font-size:14px; }
  .day-vol{ font-family:'JetBrains Mono',monospace; color:var(--accent); font-size:13px; }

  .loading{ text-align:center; color:var(--text-muted); padding:40px 0; font-size:14px; }

  .calendar-grid{
    display:grid;
    grid-template-columns:repeat(7, minmax(0, 1fr));
    gap:6px;
    margin-top:8px;
  }
  .calendar-day{
    aspect-ratio:1 / 1;
    border:1px solid var(--border);
    border-radius:12px;
    padding:4px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:flex-start;
    cursor:pointer;
    color:var(--text);
    transition:transform .15s ease, border-color .15s ease;
    background:rgba(255,255,255,.03);
  }
  .calendar-day:hover{ transform:translateY(-1px); border-color:var(--accent); }
  .calendar-day.active{ outline:2px solid var(--accent); outline-offset:-1px; box-shadow:0 0 0 2px rgba(255,90,54,.25); }
  .calendar-day.today{ border-color:#ffd166; box-shadow:0 0 0 2px rgba(255,209,102,.25); }
  .calendar-day.muted{ opacity:.45; }
  .calendar-day .day-number{ font-size:12px; font-weight:700; }
  .calendar-day .day-count{ font-size:8px; font-weight:700; padding:2px 4px; border-radius:999px; background:rgba(0,0,0,.2); line-height:1; }
  .calendar-weekday{ text-align:center; color:var(--text-muted); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; }

  .share-preview{
    display:grid;
    gap:14px;
    padding:16px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    backdrop-filter: blur(12px);
  }
  .share-header{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
  .share-title{ font-size:20px; font-weight:800; letter-spacing:.8px; line-height:1.1; }
  .share-subtitle{ font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.4px; }
  .share-stats{ display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; }
  .share-stat{ background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); border-radius:22px; padding:16px 12px; text-align:center; }
  .share-stat .num{ font-size:24px; font-weight:800; color:var(--accent); }
  .share-stat .lbl{ font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.3px; margin-top:6px; }
  .share-badges{ display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; }
  .share-badge{ min-width:90px; flex:1; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); border-radius:22px; padding:14px 10px; text-align:center; }
  .share-badge .badge-icon{ width:34px; height:34px; border-radius:16px; margin:0 auto 10px; background:rgba(255,255,255,.15); display:flex; align-items:center; justify-content:center; color:var(--text); font-size:14px; }
  .share-badge .badge-label{ font-size:13px; color:var(--text); font-weight:700; }
  .share-placeholder{ min-height:92px; border-radius:22px; background:rgba(255,255,255,.08); display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:13px; }

  @media (max-width:480px){
    #app{ padding:max(14px, env(safe-area-inset-top)) 12px calc(20px + env(safe-area-inset-bottom)); }
    .card{ padding:13px; border-radius:16px; }
    .row, .filter-row{ grid-template-columns:1fr; }
    .stat-grid{ grid-template-columns:1fr; }
    .brand{ font-size:30px; }
    input, select{ font-size:15px; }
    input[type="date"]{ padding-right:8px; }
    input[type="number"]{ font-size:16px; }
    .share-stats{ grid-template-columns:1fr; }
    .share-badge{ min-width:0; flex:1 1 100%; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="loading" id="loading">Carregando seus dados de treino…</div>
</div>

<script>
const MUSCLE_COLORS = {
  peito:'var(--peito)', costas:'var(--costas)', perna:'var(--perna)',
  ombro:'var(--ombro)', braco:'var(--braco)', core:'var(--core)', outro:'var(--outro)'
};
const MUSCLE_LABELS = {
  peito:'Peito', costas:'Costas', perna:'Perna', ombro:'Ombro', braco:'Braço', core:'Core', outro:'Outro'
};

// mapa exercicio -> grupamento (chaves em minusculo, sem acento pra facilitar match)
const EXERCISE_DB = {
  'Supino Reto':'peito','Supino Inclinado':'peito','Supino Declinado':'peito',
  'Crucifixo':'peito','Crossover':'peito','Peck Deck':'peito','Flexao':'peito','Flexao De Braco':'peito',
  'Puxada':'costas','Puxada Frente':'costas','Puxada Alta':'costas','Pulldown':'costas',
  'Remada Baixa':'costas','Remada Curvada':'costas','Remada Cavalinho':'costas','Remada Unilateral':'costas',
  'Barra Fixa':'costas','Levantamento Terra':'costas',
  'Agachamento':'perna','Agachamento Livre':'perna','Leg Press':'perna','Cadeira Extensora':'perna',
  'Mesa Flexora':'perna','Cadeira Flexora':'perna','Panturrilha':'perna','Avanco':'perna','Afundo':'perna','Stiff':'perna',
  'Desenvolvimento':'ombro','Desenvolvimento Militar':'ombro','Elevacao Lateral':'ombro',
  'Elevacao Frontal':'ombro','Remada Alta':'ombro','Arnold Press':'ombro',
  'Rosca Direta':'braco','Rosca Alternada':'braco','Rosca Martelo':'braco','Rosca Scott':'braco',
  'Triceps Pulley':'braco','Triceps Testa':'braco','Triceps Corda':'braco','Triceps Frances':'braco',
  'Abdominal':'core','Prancha':'core','Abdominal Supra':'core','Elevacao De Pernas':'core','Abdominal Infra':'core'
};

const EXERCISE_DB_NORMALIZED = Object.fromEntries(
  Object.entries(EXERCISE_DB).map(([name, group]) => [normalize(name), group])
);

function normalize(s){
  return String(s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}
function detectGroup(name){
  const n = normalize(name);
  if(!n) return null;
  if(EXERCISE_DB_NORMALIZED[n]) return EXERCISE_DB_NORMALIZED[n];
  let best=null, bestLen=0;
  for(const key in EXERCISE_DB_NORMALIZED){
    if(n.includes(key) && key.length>bestLen){ best=EXERCISE_DB_NORMALIZED[key]; bestLen=key.length; }
  }
  return best;
}
function todayISO(){ return new Date().toLocaleDateString('sv-SE'); }
function fmtDate(iso){
  const d = new Date(iso+'T12:00:00');
  return d.toLocaleDateString('pt-BR',{weekday:'short', day:'2-digit', month:'short'});
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

let entries = [];
let tab = 'registrar';
let filterDate = todayISO();
let filterGroup = 'todos';

// rascunho do formulário (sobrevive a troca de aba e a fechar/reabrir o artifact)
let draft = { date: todayISO(), exerciseName: '', manualGroup: null, pendingSets: [] };

function loadEntries(){
  try{
    const data = localStorage.getItem('treino-entries');
    entries = data ? JSON.parse(data) : [];
  }catch(e){ entries = []; }
}
function saveEntries(){
  localStorage.setItem('treino-entries', JSON.stringify(entries));
}
function loadDraft(){
  try{
    const data = localStorage.getItem('treino-draft');
    if(data){
      const parsed = JSON.parse(data);
      draft = Object.assign({ date: todayISO(), exerciseName:'', manualGroup:null, pendingSets:[] }, parsed);
    }
  }catch(e){ /* sem rascunho salvo ainda */ }
}
function saveDraft(){
  localStorage.setItem('treino-draft', JSON.stringify(draft));
}
function clearDraft(){
  draft = { date: todayISO(), exerciseName:'', manualGroup:null, pendingSets:[] };
  saveDraft();
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <h1 class="brand">DIÁRIO DE TREINO</h1>
    <div class="brand-sub">registre suas séries e acompanhe sua evolução</div>
    <div class="tabs">
      <div class="tab-btn ${tab==='registrar'?'active':''}" onclick="setTab('registrar')">REGISTRAR</div>
      <div class="tab-btn ${tab==='dashboard'?'active':''}" onclick="setTab('dashboard')">DASHBOARD</div>
    </div>
    <div id="tab-content"></div>
  `;
  if(tab==='registrar') renderRegistrar(); else renderDashboard();
}

function setTab(t){ tab=t; render(); }

// ---------- REGISTRAR ----------
function renderRegistrar(){
  const c = document.getElementById('tab-content');
  const detected = detectGroup(draft.exerciseName);
  const group = detected || draft.manualGroup;

  c.innerHTML = `
    <div class="card">
      <label>Data</label>
      <input type="date" id="ex-date" value="${draft.date}" onchange="onDraftDateChange(this.value)">
    </div>
    <div class="card">
      <label>Exercício</label>
      <div class="combo-wrap">
        <input type="text" id="ex-name" placeholder="ex: Supino inclinado" autocomplete="off" value="${draft.exerciseName||''}" oninput="onExerciseInput()" onfocus="renderExerciseSuggestions()" onblur="setTimeout(hideExerciseSuggestions, 120)">
        <div class="combo-suggestions" id="ex-suggestions"></div>
      </div>
      <div id="group-area"></div>
    </div>

    <div class="card">
      <label>Adicionar série</label>
      <div class="row">
        <div>
          <label>Repetições</label>
          <input type="number" id="set-reps" inputmode="numeric" pattern="[0-9]*" min="0" placeholder="12">
        </div>
        <div>
          <label>Carga (kg)</label>
          <input type="number" id="set-weight" inputmode="decimal" pattern="[0-9]*" min="0" step="0.5" placeholder="40">
        </div>
        <div>
          <label>Descanso (seg, opcional)</label>
          <input type="number" id="set-time" inputmode="numeric" pattern="[0-9]*" min="0" placeholder="60">
        </div>
      </div>
      <div style="height:10px"></div>
      <button class="btn btn-add" onclick="addSet()">+ Adicionar série</button>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <label style="margin-bottom:0">Séries adicionadas (${draft.pendingSets.length})</label>
        ${draft.pendingSets.length>0?'<button class="btn-small btn-ghost" style="width:auto" onclick="discardDraft()">Limpar</button>':''}
      </div>
      <div style="height:8px"></div>
      <div id="set-list"></div>
    </div>

    <button class="btn btn-primary" onclick="saveWorkout()">Salvar treino</button>
  `;

  renderGroupArea(group);
  renderSetList();
}

function onDraftDateChange(v){ draft.date = v; saveDraft(); }

function renderExerciseSuggestions(){
  const input = document.getElementById('ex-name');
  const box = document.getElementById('ex-suggestions');
  if(!input || !box) return;

  const query = normalize(input.value);
  const matches = Object.keys(EXERCISE_DB)
    .filter(name => !query || normalize(name).includes(query))
    .slice(0, 8);

  if(!matches.length){
    box.innerHTML = '';
    box.style.display = 'none';
    return;
  }

  box.innerHTML = matches.map(name => `
    <button type="button" class="combo-option" data-value="${name}" onclick="selectExercise(this.getAttribute('data-value'))">${name}</button>
  `).join('');
  box.style.display = 'block';
}

function hideExerciseSuggestions(){
  const box = document.getElementById('ex-suggestions');
  if(box) box.style.display = 'none';
}

function selectExercise(value){
  const input = document.getElementById('ex-name');
  if(!input) return;
  input.value = value;
  draft.exerciseName = value;
  const detected = detectGroup(draft.exerciseName);
  if(detected) draft.manualGroup = null;
  renderGroupArea(detected || draft.manualGroup);
  hideExerciseSuggestions();
  saveDraft();
}

function onExerciseInput(){
  draft.exerciseName = document.getElementById('ex-name').value;
  const detected = detectGroup(draft.exerciseName);
  if(detected) draft.manualGroup = null;
  renderGroupArea(detected || draft.manualGroup);
  renderExerciseSuggestions();
  saveDraft();
}

function renderGroupArea(group){
  const area = document.getElementById('group-area');
  if(!area) return;
  if(group){
    area.innerHTML = `
      <div class="group-badge" style="background:${MUSCLE_COLORS[group]}22; color:${MUSCLE_COLORS[group]}">
        <span class="dot" style="background:${MUSCLE_COLORS[group]}"></span>${MUSCLE_LABELS[group]}
      </div>`;
  } else {
    area.innerHTML = `
      <div style="margin-top:10px">
        <label>Grupamento não identificado — selecione manualmente</label>
        <select id="manual-group" onchange="onManualGroupChange(this.value)">
          <option value="">Selecione…</option>
          ${Object.keys(MUSCLE_LABELS).map(k=>`<option value="${k}">${MUSCLE_LABELS[k]}</option>`).join('')}
        </select>
      </div>`;
  }
}

function onManualGroupChange(v){
  draft.manualGroup = v;
  renderGroupArea(v);
  saveDraft();
}

function addSet(){
  const name = document.getElementById('ex-name').value.trim();
  const reps = document.getElementById('set-reps').value;
  const weight = document.getElementById('set-weight').value;
  const time = document.getElementById('set-time').value;
  const group = detectGroup(name) || draft.manualGroup;
  if(!name){ alert('Informe o nome do exercício.'); return; }
  if(!group){ alert('Selecione o grupamento muscular.'); return; }
  if(!reps || !weight){ alert('Informe repetições e carga.'); return; }

  draft.pendingSets.push({
    id: uid(), exercise:name, group,
    reps:Number(reps), weight:Number(weight), restSeconds: time?Number(time):null
  });
  document.getElementById('set-reps').value='';
  document.getElementById('set-weight').value='';
  document.getElementById('set-time').value='';
  renderSetList();
  saveDraft();
}

function removeSet(id){
  draft.pendingSets = draft.pendingSets.filter(s=>s.id!==id);
  renderSetList();
  saveDraft();
}

function discardDraft(){
  if(draft.pendingSets.length>0 && !confirm('Descartar todas as séries ainda não salvas?')) return;
  const keepDate = draft.date;
  draft = { date: keepDate, exerciseName:'', manualGroup:null, pendingSets:[] };
  saveDraft();
  renderRegistrar();
}

function renderSetList(){
  const el = document.getElementById('set-list');
  if(!el) return;
  const header = document.querySelector('#tab-content .card:nth-child(3) label');
  if(header) header.textContent = `Séries adicionadas (${draft.pendingSets.length})`;
  if(draft.pendingSets.length===0){ el.innerHTML = '<div class="empty">Nenhuma série adicionada ainda</div>'; return; }

  // agrupa por exercício, na ordem em que foram adicionados
  const order = [];
  const byExercise = {};
  draft.pendingSets.forEach(s=>{
    if(!byExercise[s.exercise]){ byExercise[s.exercise] = []; order.push(s.exercise); }
    byExercise[s.exercise].push(s);
  });

  el.innerHTML = order.map(name=>{
    const sets = byExercise[name];
    const color = MUSCLE_COLORS[sets[0].group];
    return `
      <div style="margin-bottom:12px">
        <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px">
          <span class="dot" style="background:${color}"></span>
          <span style="font-weight:700; font-size:13px">${name}</span>
        </div>
        ${sets.map((s,i)=>`
          <div class="set-row">
            <div class="set-num">${i+1}</div>
            <div class="set-data">
              <div><span class="lbl">reps</span>${s.reps}</div>
              <div><span class="lbl">kg</span>${s.weight}</div>
              ${s.restSeconds?`<div><span class="lbl">descanso</span>${s.restSeconds}s</div>`:''}
            </div>
            <button class="del-btn" onclick="removeSet('${s.id}')">✕</button>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
}

function saveWorkout(){
  const date = draft.date || todayISO();
  if(draft.pendingSets.length===0){ alert('Adicione pelo menos uma série.'); return; }

  const newEntries = draft.pendingSets.map(s=>({
    id: uid(), date, exercise:s.exercise, muscleGroup:s.group,
    reps:s.reps, weight:s.weight, restSeconds:s.restSeconds, createdAt: Date.now()
  }));
  entries = entries.concat(newEntries);
  saveEntries();

  filterDate = date;
  clearDraft();
  tab = 'dashboard';
  render();
}

// ---------- DASHBOARD ----------
function renderDashboard(){
  const c = document.getElementById('tab-content');
  const allDates = [...new Set(entries.map(e=>e.date))].sort().reverse();

  c.innerHTML = `
    <div class="filter-row">
      <div style="flex:1">
        <label>Data</label>
        <input type="date" id="filter-date" value="${filterDate}" onchange="onFilterDateChange(this.value)">
      </div>
      <div style="flex:1">
        <label>Grupamento</label>
        <select id="filter-group" onchange="filterGroup=this.value; renderDashboard()">
          <option value="todos" ${filterGroup==='todos'?'selected':''}>Todos</option>
          ${Object.keys(MUSCLE_LABELS).map(k=>`<option value="${k}" ${filterGroup===k?'selected':''}>${MUSCLE_LABELS[k]}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="card">
      <div id="calendar"></div>
    </div>
    <div id="day-summary"></div>
    <div id="share-card" class="card"></div>
    <div id="ex-groups"></div>
    <div class="card">
      <label>Histórico de dias</label>
      <div id="history-list">
        ${allDates.length===0?'<div class="empty">Nenhum treino registrado ainda</div>':
          allDates.map(d=>{
            return `<div class="day-list-item" onclick="filterDate='${d}'; document.getElementById('filter-date').value='${d}'; renderDashboard()">
              <span class="day-date">${fmtDate(d)}</span>
            </div>`;
          }).join('')}
      </div>
    </div>
  `;
  renderCalendar();
  renderDaySummary();
}

function onFilterDateChange(v){ filterDate = v; renderDashboard(); }

function setCalendarDate(date){ filterDate = date; document.getElementById('filter-date').value = date; renderDashboard(); }

function getSeriesCountForDate(date){ return entries.filter(e=>e.date===date).length; }

function getDayColor(count){
  if(!count) return 'rgba(255,255,255,0.03)';
  const intensity = Math.min(count, 8) / 8;
  const hue = 18 + intensity * 120;
  const lightness = 18 + intensity * 16;
  return `linear-gradient(135deg, hsl(${hue} 70% ${lightness}%), hsl(${hue + 10} 70% ${Math.max(22, lightness - 4)}%))`;
}

function renderCalendar(){
  const [year, month] = filterDate.split('-').map(Number);
  const firstDay = new Date(year, month - 1, 1);
  const daysInMonth = new Date(year, month, 0).getDate();
  const startOffset = firstDay.getDay();
  const prevMonthDays = new Date(year, month - 1, 0).getDate();
  const weekdays = ['D','S','T','Q','Q','S','S'];
  const cells = [];

  for(let i = startOffset - 1; i >= 0; i--){
    const day = prevMonthDays - i;
    const prevMonth = month - 1 <= 0 ? 12 : month - 1;
    const prevYear = month - 1 <= 0 ? year - 1 : year;
    const date = `${prevYear}-${String(prevMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    cells.push({ date, day, muted:true });
  }

  for(let day = 1; day <= daysInMonth; day++){
    const date = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    cells.push({ date, day, muted:false });
  }

  let nextDay = 1;
  while(cells.length < 42){
    const nextMonth = month + 1 > 12 ? 1 : month + 1;
    const nextYear = month + 1 > 12 ? year + 1 : year;
    const date = `${nextYear}-${String(nextMonth).padStart(2,'0')}-${String(nextDay).padStart(2,'0')}`;
    cells.push({ date, day: nextDay, muted:true });
    nextDay += 1;
  }

  const title = firstDay.toLocaleDateString('pt-BR', { month:'long', year:'numeric' });
  const calendarHtml = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; gap:8px;">
      <label style="margin-bottom:0">Calendário</label>
      <div style="font-size:13px; color:var(--text-muted)">${title}</div>
    </div>
    <div class="calendar-grid">
      ${weekdays.map(w=>`<div class="calendar-weekday">${w}</div>`).join('')}
      ${cells.map(cell=>{
        const count = getSeriesCountForDate(cell.date);
        const isActive = filterDate === cell.date;
        const isToday = cell.date === todayISO();
        return `
          <button type="button" class="calendar-day ${cell.muted?'muted':''} ${isActive?'active':''} ${isToday?'today':''}" onclick="setCalendarDate('${cell.date}')" style="background:${getDayColor(count)}; color:${count>0?'#fff':'var(--text-muted)'}">
            <span class="day-number">${cell.day}</span>
            ${count>0?`<span class="day-count">${count} série${count>1?'s':''}</span>`:''}
          </button>
        `;
      }).join('')}
    </div>
  `;

  document.getElementById('calendar').innerHTML = calendarHtml;
}

function getFilteredEntries(){
  return entries.filter(e=>e.date===filterDate && (filterGroup==='todos' || e.muscleGroup===filterGroup));
}

function renderDaySummary(){
  const dayEntries = entries.filter(e=>e.date===filterDate && (filterGroup==='todos'||e.muscleGroup===filterGroup));
  const totalSets = dayEntries.length;
  const exNames = new Set(dayEntries.map(e=>e.exercise));

  document.getElementById('day-summary').innerHTML = `
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:8px;">
        <label style="margin-bottom:0">Feed do dia</label>
        <div style="font-size:12px; color:var(--text-muted)">${fmtDate(filterDate)}</div>
      </div>
      <div class="stat-grid">
        <div class="stat"><div class="num">${totalSets}</div><div class="lbl">Séries</div></div>
        <div class="stat"><div class="num">${exNames.size}</div><div class="lbl">Exercícios</div></div>
      </div>
    </div>
  `;

  const byExercise = {};
  const groupSet = new Set();
  dayEntries.forEach(e=>{
    if(!byExercise[e.exercise]) byExercise[e.exercise] = { group:e.muscleGroup, sets:[] };
    byExercise[e.exercise].sets.push(e);
    groupSet.add(e.muscleGroup);
  });

  const groupsEl = document.getElementById('ex-groups');
  const shareCard = document.getElementById('share-card');
  const names = Object.keys(byExercise);
  renderShareCard(totalSets, exNames.size, Array.from(groupSet));
  if(names.length===0){
    groupsEl.innerHTML = '<div class="card"><div class="empty">Nenhum exercício registrado para este filtro</div></div>';
    return;
  }
  groupsEl.innerHTML = `<div class="card">` + names.map(name=>{
    const data = byExercise[name];
    const color = MUSCLE_COLORS[data.group];
    return `
      <div class="ex-card" style="border-color:${color}">
        <div class="ex-title">
          <div class="ex-name">${name} <span style="color:${color}; font-size:11px; font-weight:700; margin-left:6px">${MUSCLE_LABELS[data.group]}</span></div>
        </div>
        <div class="set-chip-row">
          ${data.sets.map(s=>`
            <div class="set-chip">
              ${s.reps}×${s.weight}kg${s.restSeconds?` · ${s.restSeconds}s`:''}
              <button onclick="deleteEntry('${s.id}')">✕</button>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('') + `</div>`;
}

function deleteEntry(id){
  entries = entries.filter(e=>e.id!==id);
  saveEntries();
  renderDashboard();
}

function renderShareCard(totalSets, exerciseCount, groups){
  const shareCard = document.getElementById('share-card');
  if(!shareCard) return;

  const badges = groups.length > 0 ? groups.map(group=>`
      <div class="share-badge">
        <div class="badge-icon" style="background:${MUSCLE_COLORS[group]}33; color:${MUSCLE_COLORS[group]};">${MUSCLE_LABELS[group].slice(0,2)}</div>
        <div class="badge-label">${MUSCLE_LABELS[group]}</div>
      </div>
    `).join('') : '<div class="share-placeholder">Sem grupamentos ainda</div>';

  shareCard.innerHTML = `
    <div class="share-preview">
      <div class="share-header">
        <div>
          <div class="share-subtitle">Resumo do treino de hoje</div>
          <div class="share-title">${fmtDate(filterDate)}</div>
        </div>
        <button class="btn btn-primary" onclick="downloadShareImage()">Baixar PNG</button>
      </div>
      <div class="share-stats">
        <div class="share-stat"><div class="num">${totalSets}</div><div class="lbl">Séries Totais</div></div>
        <div class="share-stat"><div class="num">${exerciseCount}</div><div class="lbl">Exercícios</div></div>
        <div class="share-stat"><div class="num">${groups.length}</div><div class="lbl">Grupamentos</div></div>
      </div>
      <div class="share-badges">
        ${badges}
      </div>
    </div>
    <canvas id="share-canvas" width="1200" height="1200" style="display:none"></canvas>
  `;
}

function downloadShareImage(){
  const canvas = document.getElementById('share-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const dayEntries = entries.filter(e=>e.date===filterDate && (filterGroup==='todos'||e.muscleGroup===filterGroup));
  const totalSets = dayEntries.length;
  const exerciseCount = new Set(dayEntries.map(e=>e.exercise)).size;
  const groups = Array.from(new Set(dayEntries.map(e=>e.muscleGroup)));

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const padding = 80;
  ctx.fillStyle = 'rgba(255,255,255,0.0)';
  ctx.fillRoundRect(padding - 16, 40, canvas.width - padding*2 + 32, 280, 36);

  ctx.fillStyle = '#f5f3ee';
  ctx.font = 'bold 52px Inter';
  ctx.fillText('Resumo do Treino', padding, 120);
  ctx.font = '500 28px Inter';
  ctx.fillStyle = '#c7c6cf';
  ctx.fillText(fmtDate(filterDate).toUpperCase(), padding, 170);

  const statTop = 220;
  const statWidth = (canvas.width - padding*2 - 40)/3;
  ctx.font = '600 22px Inter';
  [['Séries', totalSets], ['Exercícios', exerciseCount], ['Grupamentos', groups.length]].forEach((item,i)=>{
    const x = padding + i*(statWidth + 20);
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRoundRect(x, statTop, statWidth, 180, 30);
    ctx.fillStyle = '#ff5a36';
    ctx.font = 'bold 72px Inter';
    ctx.fillText(item[1], x + 30, statTop + 110);
    ctx.fillStyle = '#f5f3ee';
    ctx.font = '600 24px Inter';
    ctx.fillText(item[0], x + 30, statTop + 150);
  });

  const badgeTop = statTop + 260;
  ctx.fillStyle = '#f5f3ee';
  ctx.font = '700 28px Inter';
  ctx.fillText('Grupamentos', padding, badgeTop);
  const badgeSize = 170;
  const badgeGap = 22;
  groups.slice(0,4).forEach((group,i)=>{
    const col = i % 2;
    const row = Math.floor(i / 2);
    const x = padding + col * (badgeSize + badgeGap);
    const y = badgeTop + 50 + row * (badgeSize + 22);
    const rawColor = MUSCLE_COLORS[group] || '#fff';
    const cssVarMatch = rawColor.match(/^var\((--[^\)]+)\)$/);
    const resolvedColor = cssVarMatch ? getComputedStyle(document.documentElement).getPropertyValue(cssVarMatch[1]).trim() || rawColor : rawColor;
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRoundRect(x, y, badgeSize, badgeSize, 28);
    ctx.fillStyle = resolvedColor;
    ctx.fillRoundRect(x + 12, y + 12, badgeSize - 24, badgeSize - 24, 22);
    ctx.fillStyle = '#121214';
    ctx.font = '700 22px Inter';
    ctx.fillText(MUSCLE_LABELS[group], x + 18, y + badgeSize - 32);
  });
  if(groups.length === 0){
    ctx.fillStyle = '#9b9aa3';
    ctx.font = '600 24px Inter';
    ctx.fillText('Nenhum treino registrado', padding, badgeTop + 120);
  }

  const link = document.createElement('a');
  link.href = canvas.toDataURL('image/png');
  link.download = `treino-${filterDate}.png`;
  link.click();
}

if (!CanvasRenderingContext2D.prototype.fillRoundRect) {
  CanvasRenderingContext2D.prototype.fillRoundRect = function(x,y,w,h,r){
    if(typeof r==='undefined') r=8;
    this.beginPath();
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);
    this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);
    this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
    this.fill();
  };
}

// ---------- INIT ----------
(function init(){
  loadEntries();
  loadDraft();
  render();
})();
</script>
