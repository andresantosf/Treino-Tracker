<script>
const MUSCLE_COLORS = {
  // Peito
  peito: 'var(--peito)',
  peito_superior: 'var(--peito)',
  peito_inferior: 'var(--peito)',

  // Costas
  latissimo: 'var(--costas)',
  costas_media: 'var(--costas)',
  lombar: 'var(--costas)',

  // Ombros
  ombro_anterior: 'var(--ombro)',
  ombro_lateral: 'var(--ombro)',
  ombro_posterior: 'var(--ombro)',

  // Braços
  biceps: 'var(--braco)',
  braquial: 'var(--braco)',
  triceps: 'var(--braco)',

  // Pernas
  quadriceps: 'var(--perna)',
  posterior_coxa: 'var(--perna)',
  gluteos: 'var(--perna)',
  gluteo_medio: 'var(--perna)',
  panturrilha: 'var(--perna)',

  // Core
  reto_abdominal: 'var(--core)',
  obliquos: 'var(--core)',
  core: 'var(--core)',

  outro: 'var(--outro)'
};

const MUSCLE_LABELS = {
  // Peito
  peito: 'Peito',
  peito_superior: 'Peito Superior',
  peito_inferior: 'Peito Inferior',

  // Costas
  latissimo: 'Latíssimo',
  costas_media: 'Costas Média',
  lombar: 'Lombar',

  // Ombros
  ombro_anterior: 'Deltoide Anterior',
  ombro_lateral: 'Deltoide Lateral',
  ombro_posterior: 'Deltoide Posterior',

  // Braços
  biceps: 'Bíceps',
  braquial: 'Braquial',
  triceps: 'Tríceps',

  // Pernas
  quadriceps: 'Quadríceps',
  posterior_coxa: 'Posterior de Coxa',
  gluteos: 'Glúteos',
  gluteo_medio: 'Glúteo Médio',
  panturrilha: 'Panturrilha',

  // Core
  reto_abdominal: 'Reto Abdominal',
  obliquos: 'Oblíquos',
  core: 'Core',

  outro: 'Outro'
};

// mapa exercicio -> grupamento (chaves em minusculo, sem acento pra facilitar match)
const EXERCISE_DB = {
  // ======================
  // PEITO
  // ======================
  'Supino Reto': 'peito',
  'Supino Inclinado': 'peito_superior',
  'Supino Declinado': 'peito_inferior',
  'Crucifixo': 'peito',
  'Crucifixo Inclinado': 'peito_superior',
  'Crucifixo Declinado': 'peito_inferior',
  'Crossover': 'peito',
  'Crossover Alto': 'peito_inferior',
  'Crossover Baixo': 'peito_superior',
  'Peck Deck': 'peito',
  'Flexao': 'peito',
  'Flexao De Braco': 'peito',

  // ======================
  // COSTAS
  // ======================
  'Puxada': 'latissimo',
  'Puxada Frente': 'latissimo',
  'Puxada Alta': 'latissimo',
  'Pulldown': 'latissimo',
  'Barra Fixa': 'latissimo',
  'Remada Baixa': 'costas_media',
  'Remada Curvada': 'costas_media',
  'Remada Cavalinho': 'costas_media',
  'Remada Unilateral': 'costas_media',
  'Levantamento Terra': 'lombar',

  // ======================
  // OMBROS
  // ======================
  'Desenvolvimento': 'ombro_anterior',
  'Desenvolvimento Militar': 'ombro_anterior',
  'Arnold Press': 'ombro_anterior',
  'Elevacao Frontal': 'ombro_anterior',
  'Elevacao Lateral': 'ombro_lateral',
  'Remada Alta': 'ombro_lateral',

  // ======================
  // BÍCEPS
  // ======================
  'Rosca Direta': 'biceps',
  'Rosca Alternada': 'biceps',
  'Rosca Scott': 'biceps',
  'Rosca Concentrada': 'biceps',
  'Rosca Martelo': 'braquial',

  // ======================
  // TRÍCEPS
  // ======================
  'Triceps Pulley': 'triceps',
  'Triceps Testa': 'triceps',
  'Triceps Corda': 'triceps',
  'Triceps Frances': 'triceps',
  'Mergulho': 'triceps',

  // ======================
  // QUADRÍCEPS
  // ======================
  'Agachamento': 'quadriceps',
  'Agachamento Livre': 'quadriceps',
  'Agachamento Frontal': 'quadriceps',
  'Hack Squat': 'quadriceps',
  'Leg Press': 'quadriceps',
  'Cadeira Extensora': 'quadriceps',
  'Passada': 'quadriceps',

  // ======================
  // POSTERIOR DE COXA
  // ======================
  'Mesa Flexora': 'posterior_coxa',
  'Cadeira Flexora': 'posterior_coxa',
  'Stiff': 'posterior_coxa',
  'Levantamento Terra Romeno': 'posterior_coxa',
  'Good Morning': 'posterior_coxa',

  // ======================
  // GLÚTEOS
  // ======================
  'Afundo': 'gluteos',
  'Avanco': 'gluteos',
  'Hip Thrust': 'gluteos',
  'Glute Bridge': 'gluteos',
  'Abducao': 'gluteo_medio',
  'Coice': 'gluteos',

  // ======================
  // PANTURRILHAS
  // ======================
  'Panturrilha': 'panturrilha',
  'Panturrilha Em Pe': 'panturrilha',
  'Panturrilha Sentado': 'panturrilha',

  // ======================
  // CORE
  // ======================
  'Abdominal': 'reto_abdominal',
  'Abdominal Supra': 'reto_abdominal',
  'Abdominal Infra': 'reto_abdominal',
  'Elevacao De Pernas': 'reto_abdominal',
  'Prancha': 'core',
  'Prancha Lateral': 'obliquos',
  'Wood Chop': 'obliquos'
};

const EXERCISE_DB_NORMALIZED = Object.fromEntries(
  Object.entries(EXERCISE_DB).map(([name, group]) => [normalize(name), group])
);

function normalize(s){
  return String(s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}
function detectGroup(name){
  const n = normalize(name);
  if(!n) return null;
  if(EXERCISE_DB_NORMALIZED[n]) return EXERCISE_DB_NORMALIZED[n];
  let best=null, bestLen=0;
  for(const key in EXERCISE_DB_NORMALIZED){
    if(n.includes(key) && key.length>bestLen){ best=EXERCISE_DB_NORMALIZED[key]; bestLen=key.length; }
  }
  return best;
}
function todayISO(){ return new Date().toLocaleDateString('sv-SE'); }
function fmtDate(iso){
  const d = new Date(iso+'T12:00:00');
  return d.toLocaleDateString('pt-BR',{weekday:'short', day:'2-digit', month:'short'});
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

var entries = [];
var tab = 'registrar';
var filterDate = todayISO();
var filterGroup = 'todos';
var timerIntervalId = null;
var timerSeconds = 0;
var activeSet = null;
var timerMode = 'idle'; // idle, work, rest
var restTargetSetId = null;
var repsModalOpen = false;
var repsModalMode = 'save';
var editModalOpen = false;
var editModalSource = 'draft';
var editModalId = null;
var longPressTimer = null;

// rascunho do formulário (sobrevive a troca de aba e a fechar/reabrir o artifact)
var draft = { date: todayISO(), exerciseName: '', manualGroup: null, pendingSets: [] };

function formatTime(seconds){
  const min = Math.floor(seconds/60);
  const sec = seconds % 60;
  return `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function startSetTimer(){
  const name = document.getElementById('ex-name').value.trim();
  const weight = document.getElementById('set-weight').value;
  const group = detectGroup(name) || draft.manualGroup;
  if(!name){ alert('Informe o exercício para iniciar.'); return; }
  if(!group){ alert('Selecione o grupamento muscular.'); return; }
  if(!weight){ alert('Informe o peso para iniciar.'); return; }
  if(timerIntervalId){ return; }
  activeSet = { exercise:name, group, weight:Number(weight), startAt: Date.now() };
  timerMode = 'work';
  timerSeconds = 0;
  lastWorkSeconds = 0;
  timerIntervalId = setInterval(()=>{
    timerSeconds += 1;
    renderRegistrar();
  }, 1000);
  renderRegistrar();
}

function enterRestMode(){
  if(timerMode !== 'work' || !activeSet) return;
  if(timerIntervalId){
    clearInterval(timerIntervalId);
    timerIntervalId = null;
  }
  repsModalMode = 'rest';
  repsModalOpen = true;
  render();
}

function finishSet(){
  if(timerMode !== 'work' || !activeSet){ alert('Inicie o timer antes de finalizar.'); return; }
  if(timerIntervalId){
    clearInterval(timerIntervalId);
    timerIntervalId = null;
  }
  repsModalMode = 'save';
  repsModalOpen = true;
  render();
}

function submitRepsModal(){
  const repsInput = document.getElementById('reps-modal-input');
  if(!repsInput) return;
  const reps = repsInput.value.trim();
  const repsNumber = Number(reps);
  if(!reps || Number.isNaN(repsNumber) || repsNumber <= 0){
    alert('Informe um número válido de repetições.');
    return;
  }
  const duration = timerSeconds;
  const set = {
    id: uid(), exercise: activeSet.exercise, group: activeSet.group,
    reps: repsNumber, weight: activeSet.weight, durationSecs: duration, restSeconds: null, createdAt: Date.now()
  };
  draft.pendingSets.push(set);
  activeSet = null;
  repsModalOpen = false;

  if(repsModalMode === 'rest'){
    timerMode = 'rest';
    restTargetSetId = set.id;
    timerSeconds = 0;
    timerIntervalId = setInterval(()=>{
      timerSeconds += 1;
      renderRegistrar();
    }, 1000);
    saveDraft();
    renderSetList();
    render();
    return;
  }

  timerMode = 'idle';
  timerSeconds = 0;
  saveDraft();
  renderSetList();
  render();
}

function closeRepsModal(){
  repsModalOpen = false;
  render();
}

function startEditPress(source, id){
  if(longPressTimer){ clearTimeout(longPressTimer); }
  longPressTimer = setTimeout(()=>{ openEditModal(source, id); longPressTimer = null; }, 600);
}

function cancelEditPress(){
  if(longPressTimer){ clearTimeout(longPressTimer); longPressTimer = null; }
}

function openEditModal(source, id){
  const list = source === 'draft' ? draft.pendingSets : entries;
  const item = list.find(e => e.id === id);
  if(!item) return;
  editModalOpen = true;
  editModalSource = source;
  editModalId = id;
  render();
  setTimeout(() => {
    const weightInput = document.getElementById('edit-weight');
    const repsInput = document.getElementById('edit-reps');
    const durationInput = document.getElementById('edit-duration');
    const restInput = document.getElementById('edit-rest');
    if(weightInput) weightInput.value = item.weight ?? '';
    if(repsInput) repsInput.value = item.reps ?? '';
    if(durationInput) durationInput.value = item.durationSecs ?? 0;
    if(restInput) restInput.value = item.restSeconds ?? 0;
    exerciseInput?.focus();
  }, 50);
}

function submitEditModal(){
  const weight = Number(document.getElementById('edit-weight')?.value);
  const reps = Number(document.getElementById('edit-reps')?.value);
  const durationSecs = Number(document.getElementById('edit-duration')?.value);
  const restSeconds = Number(document.getElementById('edit-rest')?.value);
  if(Number.isNaN(weight) || weight < 0){ alert('Informe um peso válido.'); return; }
  if(Number.isNaN(reps) || reps <= 0){ alert('Informe repetições válidas.'); return; }
  if(Number.isNaN(durationSecs) || durationSecs < 0){ alert('Informe um tempo de execução válido.'); return; }
  if(Number.isNaN(restSeconds) || restSeconds < 0){ alert('Informe um tempo de descanso válido.'); return; }

  const list = editModalSource === 'draft' ? draft.pendingSets : entries;
  const item = list.find(e => e.id === editModalId);
  if(!item){ closeEditModal(); return; }
  item.weight = weight;
  item.reps = reps;
  item.durationSecs = durationSecs || null;
  item.restSeconds = restSeconds || null;

  if(editModalSource === 'draft'){
    saveDraft();
    renderSetList();
    renderRegistrar();
  } else {
    saveEntries();
    renderDashboard();
  }
  closeEditModal();
}

function closeEditModal(){
  editModalOpen = false;
  render();
}

function stopRest(){
  if(timerMode !== 'rest') return;
  if(timerIntervalId){
    clearInterval(timerIntervalId);
    timerIntervalId = null;
  }
  if(restTargetSetId){
    const set = draft.pendingSets.find(s => s.id === restTargetSetId);
    if(set){ set.restSeconds = timerSeconds; }
    restTargetSetId = null;
    saveDraft();
    renderSetList();
  }
  timerMode = 'idle';
  timerSeconds = 0;
  renderRegistrar();
}

function cancelSet(){
  if(timerIntervalId){
    clearInterval(timerIntervalId);
    timerIntervalId = null;
    activeSet = null;
    restTargetSetId = null;
    timerMode = 'idle';
    timerSeconds = 0;
    renderRegistrar();
  }
}

function loadEntries(){
  try{
    const data = localStorage.getItem('treino-entries');
    entries = data ? JSON.parse(data) : [];
  }catch(e){ entries = []; }
}
function saveEntries(){
  localStorage.setItem('treino-entries', JSON.stringify(entries));
}
function loadDraft(){
  try{
    const data = localStorage.getItem('treino-draft');
    if(data){
      const parsed = JSON.parse(data);
      draft = Object.assign({ date: todayISO(), exerciseName:'', manualGroup:null, pendingSets:[] }, parsed);
    }
  }catch(e){ /* sem rascunho salvo ainda */ }
}
function saveDraft(){
  localStorage.setItem('treino-draft', JSON.stringify(draft));
}
function clearDraft(){
  draft = { date: todayISO(), exerciseName:'', manualGroup:null, pendingSets:[] };
  saveDraft();
}

function setTab(t){ tab=t; render(); }

// ---------- REGISTRAR ----------

            <button class="btn btn-primary" onclick="enterRestMode()">Descanso</button>
            <button class="btn btn-ghost" onclick="finishSet()">Finalizar</button>

function onDraftDateChange(v){ draft.date = v; saveDraft(); }

function renderExerciseSuggestions(){
  const input = document.getElementById('ex-name');
  const box = document.getElementById('ex-suggestions');
  if(!input || !box) return;

  const query = normalize(input.value);
  const matches = Object.keys(EXERCISE_DB)
    .filter(name => !query || normalize(name).includes(query))
    .slice(0, 8);

  if(!matches.length){
    box.innerHTML = '';
    box.style.display = 'none';
    return;
  }

  box.innerHTML = matches.map(name => `
    <button type="button" class="combo-option" data-value="${name}" onclick="selectExercise(this.getAttribute('data-value'))">${name}</button>
  `).join('');
  box.style.display = 'block';
}

function hideExerciseSuggestions(){
  const box = document.getElementById('ex-suggestions');
  if(box) box.style.display = 'none';
}

function selectExercise(value){
  const input = document.getElementById('ex-name');
  if(!input) return;
  input.value = value;
  draft.exerciseName = value;
  const detected = detectGroup(draft.exerciseName);
  if(detected) draft.manualGroup = null;
  renderGroupArea(detected || draft.manualGroup);
  hideExerciseSuggestions();
  saveDraft();
}

function onExerciseInput(){
  draft.exerciseName = document.getElementById('ex-name').value;
  const detected = detectGroup(draft.exerciseName);
  if(detected) draft.manualGroup = null;
  renderGroupArea(detected || draft.manualGroup);
  renderExerciseSuggestions();
  saveDraft();
}

function renderGroupArea(group){
  const area = document.getElementById('group-area');
  if(!area) return;
  if(group){
    area.innerHTML = `
      <div class="group-badge" style="background:${MUSCLE_COLORS[group]}22; color:${MUSCLE_COLORS[group]}">
        <span class="dot" style="background:${MUSCLE_COLORS[group]}"></span>${MUSCLE_LABELS[group]}
      </div>`;
  } else {
    area.innerHTML = `
      <div style="margin-top:10px">
        <label>Grupamento não identificado — selecione manualmente</label>
        <select id="manual-group" onchange="onManualGroupChange(this.value)">
          <option value="">Selecione…</option>
          ${Object.keys(MUSCLE_LABELS).map(k=>`<option value="${k}">${MUSCLE_LABELS[k]}</option>`).join('')}
        </select>
      </div>`;
  }
}

function onManualGroupChange(v){
  draft.manualGroup = v;
  renderGroupArea(v);
  saveDraft();
}

function removeSet(id){
  draft.pendingSets = draft.pendingSets.filter(s=>s.id!==id);
  renderSetList();
  saveDraft();
}

function discardDraft(){
  if(draft.pendingSets.length>0 && !confirm('Descartar todas as séries ainda não salvas?')) return;
  const keepDate = draft.date;
  draft = { date: keepDate, exerciseName:'', manualGroup:null, pendingSets:[] };
  saveDraft();
  renderRegistrar();
}

function renderSetList(){
  const el = document.getElementById('set-list');
  if(!el) return;
  const header = document.querySelector('#tab-content .card:nth-child(3) label');
  if(header) header.textContent = `Séries adicionadas (${draft.pendingSets.length})`;
  if(draft.pendingSets.length===0){ el.innerHTML = '<div class="empty">Nenhuma série adicionada ainda</div>'; return; }

  // agrupa por exercício, na ordem em que foram adicionados
  const order = [];
  const byExercise = {};
  draft.pendingSets.forEach(s=>{
    if(!byExercise[s.exercise]){ byExercise[s.exercise] = []; order.push(s.exercise); }
    byExercise[s.exercise].push(s);
  });

  el.innerHTML = order.map(name=>{
    const sets = byExercise[name];
    const color = MUSCLE_COLORS[sets[0].group];
    return `
      <div style="margin-bottom:12px">
        <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px">
          <span class="dot" style="background:${color}"></span>
          <span style="font-weight:700; font-size:13px">${name}</span>
        </div>
        ${sets.map((s,i)=>`
          <div class="set-row" onmousedown="startEditPress('draft','${s.id}')" onmouseup="cancelEditPress()" onmouseleave="cancelEditPress()" ontouchstart="startEditPress('draft','${s.id}')" ontouchend="cancelEditPress()" ontouchcancel="cancelEditPress()">
            <div class="set-num">${i+1}</div>
            <div class="set-data">
              <div><span class="lbl">reps</span>${s.reps}</div>
              <div><span class="lbl">kg</span>${s.weight}</div>
              ${s.durationSecs?`<div><span class="lbl">tempo</span>${formatTime(s.durationSecs)}</div>`:''}
              ${s.restSeconds?`<div><span class="lbl">descanso</span>${formatTime(s.restSeconds)}</div>`:''}
            </div>
            <button class="del-btn" onclick="event.stopPropagation(); removeSet('${s.id}')">✕</button>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
}

function saveWorkout(){
  const date = draft.date || todayISO();
  if(draft.pendingSets.length===0){ alert('Adicione pelo menos uma série.'); return; }
  if(timerIntervalId){
    clearInterval(timerIntervalId);
    timerIntervalId = null;
  }
  if(timerMode==='rest' && restTargetSetId){
    const pending = draft.pendingSets.find(s => s.id === restTargetSetId);
    if(pending){ pending.restSeconds = timerSeconds; }
  }

  const newEntries = draft.pendingSets.map(s=>({
    id: uid(), date, exercise:s.exercise, muscleGroup:s.group,
    reps:s.reps, weight:s.weight,
    durationSecs: s.durationSecs ?? s.restSeconds ?? null,
    restSeconds: s.restSeconds ?? null,
    createdAt: Date.now()
  }));
  entries = entries.concat(newEntries);
  saveEntries();

  filterDate = date;
  clearDraft();
  tab = 'dashboard';
  render();
}

function onFilterDateChange(v){ filterDate = v; renderDashboard(); }

function setCalendarDate(date){ filterDate = date; document.getElementById('filter-date').value = date; renderDashboard(); }

function getSeriesCountForDate(date){ return entries.filter(e=>e.date===date).length; }

function getDayColor(count){
  if(!count) return 'rgba(255,255,255,0.03)';
  const intensity = Math.min(count, 8) / 8;
  const hue = 18 + intensity * 120;
  const lightness = 18 + intensity * 16;
  return `linear-gradient(135deg, hsl(${hue} 70% ${lightness}%), hsl(${hue + 10} 70% ${Math.max(22, lightness - 4)}%))`;
}

function renderCalendar(){
  const [year, month] = filterDate.split('-').map(Number);
  const firstDay = new Date(year, month - 1, 1);
  const daysInMonth = new Date(year, month, 0).getDate();
  const startOffset = firstDay.getDay();
  const prevMonthDays = new Date(year, month - 1, 0).getDate();
  const weekdays = ['D','S','T','Q','Q','S','S'];
  const cells = [];

  for(let i = startOffset - 1; i >= 0; i--){
    const day = prevMonthDays - i;
    const prevMonth = month - 1 <= 0 ? 12 : month - 1;
    const prevYear = month - 1 <= 0 ? year - 1 : year;
    const date = `${prevYear}-${String(prevMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    cells.push({ date, day, muted:true });
  }

  for(let day = 1; day <= daysInMonth; day++){
    const date = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    cells.push({ date, day, muted:false });
  }

  let nextDay = 1;
  while(cells.length < 42){
    const nextMonth = month + 1 > 12 ? 1 : month + 1;
    const nextYear = month + 1 > 12 ? year + 1 : year;
    const date = `${nextYear}-${String(nextMonth).padStart(2,'0')}-${String(nextDay).padStart(2,'0')}`;
    cells.push({ date, day: nextDay, muted:true });
    nextDay += 1;
  }

  const title = firstDay.toLocaleDateString('pt-BR', { month:'long', year:'numeric' });
  const calendarHtml = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; gap:8px;">
      <label style="margin-bottom:0">Calendário</label>
      <div style="font-size:13px; color:var(--text-muted)">${title}</div>
    </div>
    <div class="calendar-grid">
      ${weekdays.map(w=>`<div class="calendar-weekday">${w}</div>`).join('')}
      ${cells.map(cell=>{
        const count = getSeriesCountForDate(cell.date);
        const isActive = filterDate === cell.date;
        const isToday = cell.date === todayISO();
        return `
          <button type="button" class="calendar-day ${cell.muted?'muted':''} ${isActive?'active':''} ${isToday?'today':''}" onclick="setCalendarDate('${cell.date}')" style="background:${getDayColor(count)}; color:${count>0?'#fff':'var(--text-muted)'}">
            <span class="day-number">${cell.day}</span>
            ${count>0?`<span class="day-count">${count} série${count>1?'s':''}</span>`:''}
          </button>
        `;
      }).join('')}
    </div>
  `;

  document.getElementById('calendar').innerHTML = calendarHtml;
}

function getFilteredEntries(){
  return entries.filter(e=>e.date===filterDate && (filterGroup==='todos' || e.muscleGroup===filterGroup));
}

function renderDaySummary(){
  const dayEntries = entries.filter(e=>e.date===filterDate && (filterGroup==='todos'||e.muscleGroup===filterGroup));
  const totalSets = dayEntries.length;
  const exNames = new Set(dayEntries.map(e=>e.exercise));

  const totalDuration = dayEntries.reduce((sum,e)=>sum + (e.durationSecs || 0) + (e.restSeconds || 0), 0);
  document.getElementById('day-summary').innerHTML = `
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:8px;">
        <label style="margin-bottom:0">Feed do dia</label>
        <div style="font-size:12px; color:var(--text-muted)">${fmtDate(filterDate)}</div>
      </div>
      <div class="stat-grid">
        <div class="stat"><div class="num">${totalSets}</div><div class="lbl">Séries</div></div>
        <div class="stat"><div class="num">${exNames.size}</div><div class="lbl">Exercícios</div></div>
        <div class="stat"><div class="num">${formatTime(totalDuration)}</div><div class="lbl">Tempo total de treino</div></div>
      </div>
    </div>

  const byExercise = {};
  const groupSet = new Set();
  dayEntries.forEach(e=>{
    if(!byExercise[e.exercise]) byExercise[e.exercise] = { group:e.muscleGroup, sets:[] };
    byExercise[e.exercise].sets.push(e);
    groupSet.add(e.muscleGroup);
  });

  const groupsEl = document.getElementById('ex-groups');
  const shareCard = document.getElementById('share-card');
  const names = Object.keys(byExercise);
  renderShareCard(totalSets, exNames.size, Array.from(groupSet));
  if(names.length===0){
    groupsEl.innerHTML = '<div class="card"><div class="empty">Nenhum exercício registrado para este filtro</div></div>';
    return;
  }
  groupsEl.innerHTML = `<div class="card">` + names.map(name=>{
    const data = byExercise[name];
    const color = MUSCLE_COLORS[data.group];
    return `
      <div class="ex-card" style="border-color:${color}">
        <div class="ex-title">
          <div class="ex-name">${name} <span style="color:${color}; font-size:11px; font-weight:700; margin-left:6px">${MUSCLE_LABELS[data.group]}</span></div>
        </div>
        <div class="set-chip-row">
          ${data.sets.map(s=>`
            <div class="set-chip" onmousedown="startEditPress('entry','${s.id}')" onmouseup="cancelEditPress()" onmouseleave="cancelEditPress()" ontouchstart="startEditPress('entry','${s.id}')" ontouchend="cancelEditPress()" ontouchcancel="cancelEditPress()">
              ${s.reps}×${s.weight}kg${s.durationSecs?` · ${formatTime(s.durationSecs)}`:''}${s.restSeconds?` · descanso ${formatTime(s.restSeconds)}`:''}
              <button onclick="event.stopPropagation(); deleteEntry('${s.id}')">✕</button>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('') + `</div>`;
}

function deleteEntry(id){
  entries = entries.filter(e=>e.id!==id);
  saveEntries();
  renderDashboard();
}

function renderShareCard(totalSets, exerciseCount, groups){
  const shareCard = document.getElementById('share-card');
  if(!shareCard) return;

  const dayEntries = entries.filter(e=>e.date===filterDate && (filterGroup==='todos'|| e.muscleGroup===filterGroup));
  const totalDuration = dayEntries.reduce((sum,e)=>sum + (e.durationSecs || 0), 0);
  const avgDuration = dayEntries.length ? Math.round(totalDuration / dayEntries.length) : 0;
  const restEntries = dayEntries.filter(e=>typeof e.restSeconds === 'number');
  const totalRest = restEntries.reduce((sum,e)=>sum + (e.restSeconds || 0), 0);
  const avgRest = restEntries.length ? Math.round(totalRest / restEntries.length) : 0;

  const badges = groups.length > 0 ? groups.map(group=>`
      <div class="share-badge">
        <div class="badge-icon" style="background:${MUSCLE_COLORS[group]}33; color:${MUSCLE_COLORS[group]};">${MUSCLE_LABELS[group].slice(0,2)}</div>
        <div class="badge-label">${MUSCLE_LABELS[group]}</div>
      </div>
    `).join('') : '<div class="share-placeholder">Sem grupamentos ainda</div>';

  shareCard.innerHTML = `
    <div class="share-preview">
      <div class="share-header">
        <div>
          <div class="share-subtitle">Resumo do treino de hoje</div>
          <div class="share-title">${fmtDate(filterDate)}</div>
        </div>
        <button class="btn btn-primary" onclick="downloadShareImage()">Baixar PNG</button>
      </div>
      <div class="share-stats">
        <div class="share-stat"><div class="num">${totalSets}</div><div class="lbl">Séries Totais</div></div>
        <div class="share-stat"><div class="num">${exerciseCount}</div><div class="lbl">Exercícios</div></div>
        <div class="share-stat"><div class="num">${groups.length}</div><div class="lbl">Grupamentos</div></div>
        <div class="share-stat"><div class="num">${formatTime(avgDuration)}</div><div class="lbl">Média de Execução</div></div>
        <div class="share-stat"><div class="num">${formatTime(avgRest)}</div><div class="lbl">Média de Descanso</div></div>
      </div>
      <div class="share-badges">
        ${badges}
      </div>
    </div>
    <canvas id="share-canvas" width="1200" height="1200" style="display:none"></canvas>
    `;
  }

  // Load external scripts for share templates and drawing when running as files
  // These scripts override the inline downloadShareImage() with a configurable implementation.
  setTimeout(()=>{
  const base = location.pathname.replace(/\/[^/]*$/, '');
  // core modules first
  const core = ['/js/core/utils.js','/js/core/storage.js','/js/core/timer.js'];
  core.forEach(p=>{ const s=document.createElement('script'); s.src=base+p; document.body.appendChild(s); });
  // then templates, drawing and screen modules
  const list = ['/js/share-templates.js','/js/drawShare.js','/js/screens/registrar.js','/js/screens/dashboard.js','/js/screens/share-card.js'];
  list.forEach(p=>{ const s=document.createElement('script'); s.src=base+p; document.body.appendChild(s); });
  }, 50);

function downloadShareImage(){
  const canvas = document.getElementById('share-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const dayEntries = entries.filter(e=>e.date===filterDate && (filterGroup==='todos'||e.muscleGroup===filterGroup));
  const totalSets = dayEntries.length;
  const exerciseCount = new Set(dayEntries.map(e=>e.exercise)).size;
  const groups = Array.from(new Set(dayEntries.map(e=>e.muscleGroup)));

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const padding = 80;
  ctx.fillStyle = 'rgba(22,22,22,0.4)';
  ctx.fillRoundRect(padding - 16, 40, canvas.width - padding*2 + 32, 170, 36);

  ctx.fillStyle = '#f5f3ee';
  ctx.font = 'bold 72px Inter';
  ctx.fillText('Resumo do Treino', 110, 120);
  ctx.font = '600 36px Inter';
  ctx.fillStyle = '#c7c6cf';
  ctx.fillText(fmtDate(filterDate).toUpperCase(), 110, 170);

  const totalDuration = dayEntries.reduce((sum,e)=>sum + (e.durationSecs || 0) + (e.restSeconds || 0), 0);
  
  const statTop = 240;
  const statWidth = (canvas.width - padding*2 - 40)/3;
  [['Séries', totalSets], ['Exercícios', exerciseCount], ['Grupamentos', groups.length]].forEach((item,i)=>{
    const x = padding + i*(statWidth + 20);
    ctx.fillStyle = 'rgba(22,22,22,0.4)';
    ctx.fillRoundRect(x, statTop, statWidth, 210, 36);
    ctx.fillStyle = '#ff5a36';
    ctx.font = 'bold 96px Inter';
    ctx.fillText(item[1], x + 30, statTop + 135);
    ctx.fillStyle = '#f5f3ee';
    ctx.font = '700 28px Inter';
    ctx.fillText(item[0], x + 30, statTop + 190);
  });

  const totalBlockTop = statTop + 250;
  const totalBlockHeight = 160;
  ctx.fillStyle = 'rgba(22,22,22,0.4)';
  ctx.fillRoundRect(padding, totalBlockTop, canvas.width - padding*2, totalBlockHeight, 36);
  ctx.fillStyle = '#ff5a36';
  ctx.font = 'bold 64px Inter';
  ctx.fillText(formatTime(totalDuration), padding + 30, totalBlockTop + 130);
  ctx.fillStyle = '#f5f3ee';
  ctx.font = '700 24px Inter';
  ctx.fillText('Tempo total de treino', padding + 30, totalBlockTop + 42);

  const badgeTop = totalBlockTop + totalBlockHeight + 80;
  ctx.fillStyle = '#f5f3ee';
  ctx.font = '800 36px Inter';
  ctx.fillText('Grupamentos', padding, badgeTop);
  let tagX = padding;
  let tagY = badgeTop + 60;
  const tagGapX = 18;
  const tagGapY = 18;
  const tagHeight = 64;
  ctx.font = '800 28px Inter';
  groups.forEach((group,i) => {
    const tagText = `# ${MUSCLE_LABELS[group]}`;
    const textWidth = ctx.measureText(tagText).width;
    const tagWidth = textWidth + 90;
    if(tagX + tagWidth > canvas.width - padding){
      tagX = padding;
      tagY += tagHeight + tagGapY;
    }
    const rawColor = MUSCLE_COLORS[group] || '#fff';
    const cssVarMatch = rawColor.match(/^var\((--[^\)]+)\)$/);
    const resolvedColor = cssVarMatch ? getComputedStyle(document.documentElement).getPropertyValue(cssVarMatch[1]).trim() || rawColor : rawColor;
    ctx.fillStyle = 'rgba(22,22,22,0.4)';
    ctx.fillRoundRect(tagX, tagY, tagWidth, tagHeight, tagHeight/2);
    ctx.fillStyle = resolvedColor;
    ctx.fillRoundRect(tagX + 12, tagY + 14, 32, 32, 16);
    ctx.fillStyle = '#fff';
    ctx.font = '800 32px Inter';
    ctx.fillText(tagText, tagX + 54, tagY + 42);
    tagX += tagWidth + tagGapX;
  });
  if(groups.length === 0){
    ctx.fillStyle = '#9b9aa3';
    ctx.font = '700 32px Inter';
    ctx.fillText('Nenhum treino registrado', padding, badgeTop + 140);
  }

  const link = document.createElement('a');
  link.href = canvas.toDataURL('image/png');
  link.download = `treino-${filterDate}.png`;
  link.click();
}

if (!CanvasRenderingContext2D.prototype.fillRoundRect) {
  CanvasRenderingContext2D.prototype.fillRoundRect = function(x,y,w,h,r){
    if(typeof r==='undefined') r=8;
    this.beginPath();
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);
    this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);
    this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
    this.fill();
  };
}

// ---------- INIT ----------
(function init(){
  loadEntries();
  loadDraft();
  render();
})();
</script>
